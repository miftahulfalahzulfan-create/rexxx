<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Top Up Game</title>
</head>
<body>
<h2>Top Up Game</h2>
<input id="userId" placeholder="User ID"><br>
<input id="nominal" placeholder="Nominal"><br>
<button onclick="topup()">Bayar</button>

<script>
async function topup(){
  const userId=document.getElementById('userId').value;
  const nominal=document.getElementById('nominal').value;

  const res=await fetch('/api/payment',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({userId,nominal})
  });

  const data=await res.json();
  localStorage.setItem('order_id', data.transaction_details?.order_id);

  const qr=data.actions?.find(a=>a.name==='generate-qr-code');
  if(qr){ window.location='status.html?qr='+encodeURIComponent(qr.url);}
}
</script>
</body>
</html>
